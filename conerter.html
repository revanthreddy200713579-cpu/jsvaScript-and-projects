<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="conveter.css">
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
               <p>Enter Amount</p>
                <input value="100" type="text" class="num" >
            </div>
            <div class="drop">
                <div class="from">
                    <p>From</p>
                    <div class="container1">
                        <img class="first" src="https://flagsapi.com/US/flat/64.png">
                        <select class="a fom">
                            <option value="USD">USD</option>
                            <option value="INR">INR</option>
                             <option value="EUR">EUR</option>
                            <option value="AND">AND</option>
                        </select>
                    </div>
                </div>
                <div class="to">
                    <p>to</p>

                    <div class="container1">
                        <img src="https://flagsapi.com/IN/flat/64.png">
                        <select class="b fom">
                            <option value="USD">USD</option>
                            <option value="INR">INR</option>
                             <option value="EUR">EUR</option>
                            <option value="AND">AND</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="msg">1USD =80INR</div>
            <button class="cls">Get Exchange Rate</button>
        </form>
    </div>
    
    <script src="list.js"></script>
    <script src="conveter.js"></script>
</body>
</html>
